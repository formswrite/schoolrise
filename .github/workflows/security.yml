name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: gitleaks detect
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --verbose

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: install encore cli
        run: |
          curl -L https://encore.dev/install.sh | bash -s -- 1.52.1
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: generate encore wrappers
        run: encore gen wrappers
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      # govulncheck currently flags stdlib CVEs on go1.25.4 (the toolchain
      # bundled by Encore CLI v1.52.1). Patches landed in go1.25.5+, but we
      # can't bump until Encore catches up. Report-only until then.
      - run: govulncheck ./...
        continue-on-error: true

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true

  codeql-go:
    name: codeql go
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  codeql-js:
    name: codeql javascript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
