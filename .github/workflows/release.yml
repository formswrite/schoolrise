name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  service-images:
    name: build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - tenancy
          - people
          - academics
          - enrollment
          - forms
          - assessment
          - progression
          - imports
          - notifications
          - ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install encore cli
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: install baml-cli + goimports
        run: |
          go install github.com/boundaryml/baml/baml-cli@latest
          go install golang.org/x/tools/cmd/goimports@latest
      - name: regenerate baml client
        run: cd apps/ai && baml-cli generate
      - uses: docker/setup-buildx-action@v3
      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: encore build docker
        env:
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.ref_name }}
        run: |
          encore build docker \
            --cgo \
            --base=debian:bookworm-slim \
            "ghcr.io/formswrite/schoolrise-${SERVICE}:${TAG}" \
            "--services=${SERVICE}" \
            --config=infra-config/selfhost.json
      - name: push
        env:
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.ref_name }}
        run: |
          docker push "ghcr.io/formswrite/schoolrise-${SERVICE}:${TAG}"
          docker tag \
            "ghcr.io/formswrite/schoolrise-${SERVICE}:${TAG}" \
            "ghcr.io/formswrite/schoolrise-${SERVICE}:latest"
          docker push "ghcr.io/formswrite/schoolrise-${SERVICE}:latest"

  gateway-image:
    name: build gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install encore cli
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: encore build gateway
        env:
          TAG: ${{ github.ref_name }}
        run: |
          encore build docker \
            --cgo \
            --base=debian:bookworm-slim \
            "ghcr.io/formswrite/schoolrise-gateway:${TAG}" \
            --gateways=api \
            --config=infra-config/selfhost.json
      - name: push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          docker push "ghcr.io/formswrite/schoolrise-gateway:${TAG}"
          docker tag \
            "ghcr.io/formswrite/schoolrise-gateway:${TAG}" \
            "ghcr.io/formswrite/schoolrise-gateway:latest"
          docker push "ghcr.io/formswrite/schoolrise-gateway:latest"

  web-image:
    name: build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/formswrite/schoolrise-web
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
