name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install encore cli
        run: |
          curl -L https://encore.dev/install.sh | bash -s -- 1.52.1
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: generate encore wrappers
        run: encore gen wrappers
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - run: go vet ./...

  web-lint:
    name: web prettier+eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
