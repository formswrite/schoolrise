name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-lint:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install encore cli
        run: |
          curl -L https://encore.dev/install.sh | bash -s -- 1.52.1
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - name: generate encore wrappers
        run: encore gen wrappers
      # NOTE: golangci-lint is intentionally not run here yet. Our .golangci.yml
      # is in v2 schema (linters.exclusions, linters.settings, top-level
      # formatters block) which v1.62.2 rejects, and v2.12.1 also rejects it
      # because the enable/disable lists reference linter names that aren't
      # in v2.12.1's catalog. Proper fix: audit + migrate the config.
      # Tracked separately. For now, go vet provides basic static analysis.
      - run: go vet ./...

  web-lint:
    name: web prettier+eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
