name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test:
    name: go test (pkg + internal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # NOTE: encore test ./... is intentionally not run in CI yet —
      # tracked separately. Encore's runtime hooks SIGSEGV on every
      # ubuntu-latest test binary at lazyTraceInit (addr=0x10),
      # independent of CLI version or go.mod toolchain. Until the
      # upstream issue is resolved, run `make test` locally for the
      # full encore test suite. CI exercises the non-Encore packages.
      - name: go test
        run: go test -race -shuffle=on -coverprofile=coverage.out ./pkg/... ./internal/...
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  web-test:
    name: web vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit -- --run

  web-e2e:
    name: web playwright
    # E2e tests need the full docker stack (postgres + minio + encore + sveltekit)
    # which CI doesn't provision. Trigger manually via the Actions UI when
    # validating against a deployed environment.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      MINIO_ACCESS_KEY: ci-build-stub
      MINIO_SECRET_KEY: ci-build-stub
      MINIO_ENDPOINT: http://localhost:9000
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
