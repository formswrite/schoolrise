x-service-defaults: &service-defaults
  env_file: ../.env
  environment:
    ENCORE_RUNTIME_CONFIG: /infra/selfhost.json
    DB_HOST: postgres:5432
    DB_PASSWORD: ${POSTGRES_PASSWORD}
  volumes:
    - ../infra-config/selfhost.json:/infra/selfhost.json:ro
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schoolrise
      POSTGRES_USER: schoolrise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolrise"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  auth:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-auth:${TAG:-latest}
  tenancy:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-tenancy:${TAG:-latest}
  people:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-people:${TAG:-latest}
  academics:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-academics:${TAG:-latest}
  enrollment:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-enrollment:${TAG:-latest}
  forms:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-forms:${TAG:-latest}
  assessment:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-assessment:${TAG:-latest}
  progression:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-progression:${TAG:-latest}
  imports:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-imports:${TAG:-latest}
  notifications:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-notifications:${TAG:-latest}
  ai:
    <<: *service-defaults
    image: ghcr.io/formswrite/schoolrise-ai:${TAG:-latest}

  gateway:
    image: ghcr.io/formswrite/schoolrise-gateway:${TAG:-latest}
    env_file: ../.env
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - tenancy
      - people
      - academics
      - enrollment
      - forms
      - assessment
      - progression
      - imports
      - notifications
      - ai
    restart: unless-stopped

  web:
    image: ghcr.io/formswrite/schoolrise-web:${TAG:-latest}
    env_file: ../.env
    environment:
      ENCORE_API_URL: http://gateway:8080
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  pgdata: {}
