# SchoolRise — MinIO (own compose project, internal-only)
#
# Boot:  docker compose --env-file ../../.env.production -f deploy/compose/minio.yml up -d
#
# Joins `schoolrise-net`. NO host port mappings — MinIO is reachable only from inside
# the network as `minio:9000` (S3 API) and `minio:9001` (console). Admin reaches the
# console via `ssh -L 9001:minio:9001 server` and visits http://localhost:9001.
#
# Bucket policy is **private** (no anonymous-download). All file fetches go through
# SvelteKit's `/api/uploads/[key]` proxy on the web service.

services:
  minio:
    image: minio/minio:latest
    container_name: schoolrise-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data-prod:/data
    networks: [schoolrise-net]
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: schoolrise-minio-init
    depends_on:
      - minio
    networks: [schoolrise-net]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo "waiting for minio…" && sleep 2
        done
        /usr/bin/mc mb -p local/${MINIO_BUCKET} || true
        # PRIVATE bucket — never set anonymous download in production.
        echo "minio bucket ready (private)"
    restart: "no"

networks:
  schoolrise-net:
    external: true

volumes:
  minio-data-prod: {}
