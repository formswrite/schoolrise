run:
  concurrency: 4
  timeout: 5m
  tests: true
  go: "1.23"

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    - gocritic
    - revive
    - wsl_v5
    - whitespace
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    - gocyclo
    - nestif
    - funlen
    - dupl
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    - gosec
    - bidichk
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    - sqlclosecheck
    - rowserrcheck
    - sloglint
    - loggercheck
    - testifylint
    - thelper
    - usetesting
    - paralleltest
    - modernize
    - exptostd
    - intrange
    - usestdlibvars
    - exhaustive
    - nolintlint
  disable:
    - godot
    - lll
    - prealloc
    - wrapcheck
    - err113
    - mnd
    - iface
    - nakedret
    - noinlineerr
    - gocognit
    - cyclop
    - depguard
    - goheader
    - importas
    - funcorder
    - godoclint
    - varnamelen
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - unparam
    - makezero
    - testpackage
    - embeddedstructfieldcheck
    - iotamixing
    - unqueryvet
    - recvcheck
    - mirror
    - protogetter
    - spancheck
    - zerologlint
  exclusions:
    paths:
      - vendor$
      - third_party$
      - testutils$
      - examples$
      - apps/ai/baml_client
      - tools/loadtest
      - apps/web/node_modules
      - "encore.gen.go$"
  settings:
    dupl:
      threshold: 100
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: false
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 120
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 4
    gocyclo:
      min-complexity: 13
    nolintlint:
      require-explanation: true
      require-specific: true
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2

formatters:
  enable:
    - gofmt
    - gofumpt
  disable:
    - gci
    - goimports
    - golines
    - swaggo
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
